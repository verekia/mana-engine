background: '#87ceeb'
entities:
  # Camera
  - id: camera
    name: Camera
    type: camera
    transform: { position: [0, 4, 8] }
    camera: { fov: 50, near: 0.1, far: 200 }
    scripts: [{ name: camera-follow }]

  # Lights
  - id: sun
    name: Sun
    type: directional-light
    transform: { position: [5, 10, 5] }
    light: { color: '#fff5e6', intensity: 2 }
    castShadow: true
  - id: ambient
    name: Ambient Light
    type: ambient-light
    light: { color: '#b0d4f1', intensity: 0.6 }

  # Player (capsule)
  - id: player
    name: Player
    type: mesh
    transform: { position: [0, 2, 0] }
    mesh: { geometry: capsule, material: { color: '#e84057' } }
    rigidBody: { type: dynamic, lockRotation: [true, true, true] }
    collider: { shape: capsule, radius: 0.5, halfHeight: 0.5 }
    castShadow: true
    scripts:
      - { name: player-controller, params: { moveSpeed: 6, jumpForce: 8 } }
      - { name: fall-reset, params: { minY: -10, resetX: 0, resetY: 3 } }

  # ── Platforms ─────────────────────────────────────────────────────────────────

  # Starting platform (wide, safe)
  - id: platform-start
    name: Start Platform
    type: mesh
    transform: { position: [0, -0.5, 0], scale: [8, 1, 3] }
    mesh: { geometry: box, material: { color: '#4a6741' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [4, 0.5, 1.5] }
    receiveShadow: true

  # Platform 2 (first jump)
  - id: platform-2
    name: Platform 2
    type: mesh
    transform: { position: [7, 0.5, 0], scale: [5, 1, 3] }
    mesh: { geometry: box, material: { color: '#5a7751' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [2.5, 0.5, 1.5] }
    receiveShadow: true

  # Platform 3 (wider, first enemy)
  - id: platform-3
    name: Platform 3
    type: mesh
    transform: { position: [13, 2, 0], scale: [6, 1, 3] }
    mesh: { geometry: box, material: { color: '#4a6741' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [3, 0.5, 1.5] }
    receiveShadow: true

  # Platform 4 (small gap jump)
  - id: platform-4
    name: Platform 4
    type: mesh
    transform: { position: [19, 1.5, 0], scale: [3, 1, 3] }
    mesh: { geometry: box, material: { color: '#5a7751' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [1.5, 0.5, 1.5] }
    receiveShadow: true

  # Platform 5 (long, two enemies)
  - id: platform-5
    name: Platform 5
    type: mesh
    transform: { position: [24, 3, 0], scale: [7, 1, 3] }
    mesh: { geometry: box, material: { color: '#4a6741' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [3.5, 0.5, 1.5] }
    receiveShadow: true

  # Platform 6 (descent)
  - id: platform-6
    name: Platform 6
    type: mesh
    transform: { position: [31, 2, 0], scale: [4, 1, 3] }
    mesh: { geometry: box, material: { color: '#5a7751' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [2, 0.5, 1.5] }
    receiveShadow: true

  # Platform 7 (high, enemy)
  - id: platform-7
    name: Platform 7
    type: mesh
    transform: { position: [37, 3.5, 0], scale: [4, 1, 3] }
    mesh: { geometry: box, material: { color: '#4a6741' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [2, 0.5, 1.5] }
    receiveShadow: true

  # Final platform (goal)
  - id: platform-end
    name: End Platform
    type: mesh
    transform: { position: [43, 2, 0], scale: [6, 1, 3] }
    mesh: { geometry: box, material: { color: '#d4af37' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [3, 0.5, 1.5] }
    receiveShadow: true

  # ── Enemies ───────────────────────────────────────────────────────────────────

  # Enemy 1 — patrols platform 3
  - id: enemy-1
    name: Enemy 1
    type: mesh
    transform: { position: [13, 3, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: sphere, material: { color: '#9b30ff' } }
    rigidBody: { type: kinematic }
    collider: { shape: sphere, radius: 0.5 }
    castShadow: true
    scripts:
      - { name: enemy-patrol, params: { minX: 10.5, maxX: 15.5, speed: 2 } }

  # Enemy 2 — patrols left side of platform 5
  - id: enemy-2
    name: Enemy 2
    type: mesh
    transform: { position: [22, 4, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: sphere, material: { color: '#9b30ff' } }
    rigidBody: { type: kinematic }
    collider: { shape: sphere, radius: 0.5 }
    castShadow: true
    scripts:
      - { name: enemy-patrol, params: { minX: 21, maxX: 24, speed: 2.5 } }

  # Enemy 3 — patrols right side of platform 5
  - id: enemy-3
    name: Enemy 3
    type: mesh
    transform: { position: [26, 4, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: sphere, material: { color: '#9b30ff' } }
    rigidBody: { type: kinematic }
    collider: { shape: sphere, radius: 0.5 }
    castShadow: true
    scripts:
      - { name: enemy-patrol, params: { minX: 24.5, maxX: 27, speed: 2.5 } }

  # Enemy 4 — patrols platform 7
  - id: enemy-4
    name: Enemy 4
    type: mesh
    transform: { position: [37, 4.5, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: sphere, material: { color: '#9b30ff' } }
    rigidBody: { type: kinematic }
    collider: { shape: sphere, radius: 0.5 }
    castShadow: true
    scripts:
      - { name: enemy-patrol, params: { minX: 35.5, maxX: 38.5, speed: 3 } }

  # ── Win zone ──────────────────────────────────────────────────────────────────

  - id: win-zone
    name: Win Zone
    type: mesh
    transform: { position: [43, 4, 0], scale: [0.6, 0.6, 0.6] }
    mesh: { geometry: sphere, material: { color: '#ffd700' } }
    scripts: [{ name: win-zone }]

  # ── Pickups ───────────────────────────────────────────────────────────────────

  - id: pickup-1
    name: Pickup 1
    type: mesh
    transform: { position: [7, 3, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: box, material: { color: '#00e5ff' } }
    rigidBody: { type: kinematic }
    castShadow: true
    scripts: [{ name: pickup }]

  - id: pickup-2
    name: Pickup 2
    type: mesh
    transform: { position: [13, 4.5, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: box, material: { color: '#00e5ff' } }
    rigidBody: { type: kinematic }
    castShadow: true
    scripts: [{ name: pickup }]

  - id: pickup-3
    name: Pickup 3
    type: mesh
    transform: { position: [19, 4, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: box, material: { color: '#00e5ff' } }
    rigidBody: { type: kinematic }
    castShadow: true
    scripts: [{ name: pickup }]

  - id: pickup-4
    name: Pickup 4
    type: mesh
    transform: { position: [31, 4.5, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: box, material: { color: '#00e5ff' } }
    rigidBody: { type: kinematic }
    castShadow: true
    scripts: [{ name: pickup }]

  - id: pickup-5
    name: Pickup 5
    type: mesh
    transform: { position: [37, 6, 0], scale: [0.5, 0.5, 0.5] }
    mesh: { geometry: box, material: { color: '#00e5ff' } }
    rigidBody: { type: kinematic }
    castShadow: true
    scripts: [{ name: pickup }]

  # ── UI ────────────────────────────────────────────────────────────────────────

  - id: hud
    name: HUD
    type: ui
    ui: { component: LevelHud }

  - id: pickup-counter
    name: Pickup Counter
    type: ui
    ui: { component: PickupCounter }

  - id: health-bar
    name: Health Bar
    type: ui
    ui: { component: HealthBar }

  - id: game-over
    name: Game Over
    type: ui
    ui: { component: GameOver }

  - id: level-complete
    name: Level Complete
    type: ui
    ui: { component: LevelComplete }
