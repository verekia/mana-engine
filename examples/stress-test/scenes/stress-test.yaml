background: '#0a0a1a'
entities:
  - id: camera
    name: Camera
    type: camera
    transform: { position: [0, 34.482, 85.612], rotation: [-0.464, 0, 0], scale: [1, 1, 1] }
    camera: { fov: 50, near: 0.1, far: 500 }
  - id: sun
    name: Sun
    type: directional-light
    transform: { position: [10, 20, 10] }
    light: { color: '#ffffff', intensity: 2, castShadow: true }
    castShadow: true
  - id: ambient
    name: Ambient Light
    type: ambient-light
    light: { color: '#ffffff', intensity: 0.3 }
  - id: ground
    name: Ground
    type: mesh
    transform: { position: [0, -8, 0], scale: [60, 0.1, 60] }
    mesh: { geometry: box, material: { color: '#1a1a2e' } }
    receiveShadow: true
  - id: spawner
    name: Spawner
    type: mesh
    transform: { position: [0, 0, 0], scale: [0.01, 0.01, 0.01] }
    mesh: { geometry: box, material: { color: '#000000' } }
    scripts: [{ name: stress-spawner, params: { clusters: 5, prefabsPerCluster: 1000 } }]
