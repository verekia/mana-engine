background: '#1a2a1a'
entities:
  - id: camera
    name: Camera
    type: camera
    transform: { position: [0, 16, 0], rotation: [-1.5708, 0, 0] }
    camera: { fov: 50, near: 0.1, far: 100 }
    scripts: [{ name: camera-top-down, params: { height: 16 } }]
  - id: sun
    name: Sun
    type: directional-light
    transform: { position: [5, -5, 10] }
    light: { color: '#fff5e6', intensity: 1.5 }
    castShadow: true
  - id: ambient
    name: Ambient Light
    type: ambient-light
    light: { color: '#ffffff', intensity: 0.6 }
  - id: ground
    name: Ground
    type: mesh
    transform: { scale: [30, 30, 1] }
    mesh: { geometry: plane, material: { color: '#2d5a1e' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [15, 15, 0.01] }
    receiveShadow: true
  - id: trees
    name: Trees
    type: mesh
    children:
      [
        {
          id: tree-1,
          name: Tree 1,
