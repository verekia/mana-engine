  - id: player
    name: Player
    type: mesh
    transform: { position: [0, 0, 1] }
    mesh: { geometry: capsule, material: { color: '#4488ff' } }
    rigidBody: { type: dynamic, lockRotation: [true, true, true] }
    collider: { shape: sphere, radius: 0.5 }
    castShadow: true
    scripts: [{ name: player-move, params: { moveSpeed: 6 } }]
