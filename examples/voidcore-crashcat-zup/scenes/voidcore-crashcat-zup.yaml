background: '#1a1a2e'
entities:
  - id: camera
    name: Camera
    type: camera
    transform: { position: [5, -5, 5] }
    camera: { fov: 50, near: 0.1, far: 100 }
  - id: sun
    name: Sun
    type: directional-light
    transform: { position: [5, -5, 10] }
    light: { color: '#ffffff', intensity: 2 }
    castShadow: true
  - id: ambient
    name: Ambient Light
    type: ambient-light
    light: { color: '#ffffff', intensity: 0.4 }
  - id: ground
    name: Ground
    type: mesh
    transform: { scale: [10, 10, 1] }
    mesh: { geometry: plane, material: { color: '#4a6741' } }
    rigidBody: { type: fixed }
    collider: { shape: box, halfExtents: [5, 5, 0.01] }
    receiveShadow: true
  - id: cube
    name: Cube
    type: mesh
    transform: { position: [0, 0, 3], rotation: [0.15, 0.1, 0] }
    mesh: { geometry: box, material: { color: '#e84057' } }
    rigidBody: { type: dynamic }
    collider: { shape: box, halfExtents: [0.5, 0.5, 0.5] }
    castShadow: true
